name: LifeOS
options:
  bundleIdPrefix: com.janek
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 5.10
    GENERATE_INFOPLIST_FILE: YES
targets:
  LifeOS:
    type: application
    platform: iOS
    sources:
      - LifeOS
    info:
      path: ""
      properties:
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: LifeOS
        NSHealthShareUsageDescription: LifeOS reads selected health metrics to reduce manual logging.
        NSHealthUpdateUsageDescription: LifeOS writes selected health metrics when you choose to sync entries.
        NSFaceIDUsageDescription: Face ID protects private health and finance data inside LifeOS.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.janek.lifeos
        TARGETED_DEVICE_FAMILY: 1
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: LifeOSWidgetExtension

  LifeOSWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - LifeOSWidgetExtension
    info:
      path: ""
      properties:
        CFBundleDisplayName: LifeOS Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.janek.lifeos.widget
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
